<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camping mit Tina & Stefan</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🚐 Camping mit Tina & Stefan</h1>
    <p class="subtitle">Nichts vergessen – nur geniessen.</p>

    <h2>Reiseplanung</h2>

    <div class="trip">
        <label>
            Ziel
            <input type="text" id="destination" placeholder="z.B. Südtirol">
        </label>

        <label>
            Abreise
            <input type="date" id="departure">
        </label>

        <label>
            Rückreise
            <input type="date" id="return">
        </label>
    </div>

    <p id="countdown"></p>

    <h2>Fortschritt</h2>

    <div class="progress">
        <div id="progressBar"></div>
    </div>

    <p id="progressText">0 von 0 eingepackt</p>

    <h2>Packliste</h2>

    <div id="categories"></div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>

</html>
